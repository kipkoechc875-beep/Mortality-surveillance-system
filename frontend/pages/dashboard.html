<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
  <h1>Dashboard</h1>
  <div id="analytics">
    <p>Total Death Records: <span id="totalDeaths">0</span></p>
    <p>Most Common Cause: <span id="commonCause">N/A</span></p>
  </div>

  <script>
    async function loadAnalytics() {
      try {
        const res = await fetch('http://localhost:3000/api/deaths/analytics');
        const data = await res.json();
        document.getElementById('totalDeaths').innerText = data.total || 0;
        document.getElementById('commonCause').innerText = data.mostCommonCause || 'N/A';
      } catch (err) {
        console.error('Error fetching analytics:', err);
      }
    }

    loadAnalytics();
  </script>
</body>
</html>
